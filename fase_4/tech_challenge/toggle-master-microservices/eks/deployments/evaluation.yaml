apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-deployment
  namespace: toggle-master
  labels:
    app: evaluation
    tier: backend
    tags.datadoghq.com/env: "dev"
    tags.datadoghq.com/service: "evaluation-service"
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation
      tier: backend
  template:
    metadata:
      labels:
        app: evaluation
        tier: backend
        tags.datadoghq.com/env: "dev"
        tags.datadoghq.com/service: "evaluation-service"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
        admission.datadoghq.com/enabled: "true"
        ad.datadoghq.com/evaluation-container.checks: |
          {
            "openmetrics": {
              "instances": [
                {
                  "openmetrics_endpoint": "http://%%host%%:8004/metrics",
                  "namespace": "toggle_master",
                  "metrics": [
                    "http_requests_total",
                    "http_request_duration_seconds",
                    "process_cpu_seconds_total",
                    "process_resident_memory_bytes"
                  ]
                }
              ]
            }
          }
    spec:
      containers:
        - name: evaluation-container
          image: 951619424825.dkr.ecr.us-east-1.amazonaws.com/toggle-master:evaluation-service-b3af170242fdc8a9d89e3fb81a3e1fb7f0617204
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
          envFrom:
            - configMapRef:
                name: evaluation-config
            - secretRef:
                name: evaluation-secret
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
