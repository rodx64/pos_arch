apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-deployment
  namespace: toggle-master
  labels:
    app: targeting
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting
      tier: backend
  template:
    metadata:
      labels:
        app: targeting
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
        admission.datadoghq.com/enabled: "true"
    spec:
      containers:
        - name: targeting-container
          image: 951619424825.dkr.ecr.us-east-1.amazonaws.com/toggle-master:targeting-service-f86fdac356476f687c260532b625328b5904105e
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: targeting-config
            - secretRef:
                name: targeting-secret
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
