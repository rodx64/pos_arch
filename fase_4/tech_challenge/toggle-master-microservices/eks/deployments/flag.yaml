apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-deployment
  namespace: toggle-master
  labels:
    app: flag
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag
      tier: backend
  template:
    metadata:
      labels:
        app: flag
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
        admission.datadoghq.com/enabled: "true"
        ad.datadoghq.com/analytics-container.checks: |
          {
            "openmetrics": {
              "instances": [
                {
                  "openmetrics_endpoint": "http://%%host%%:8002/metrics",
                  "namespace": "toggle_master",
                  "metrics": [
                    "http_requests_total",
                    "http_request_duration_seconds",
                    "process_cpu_seconds_total",
                    "process_resident_memory_bytes"
                  ]
                }
              ]
            }
          }
    spec:
      containers:
        - name: flag-container
          image: 951619424825.dkr.ecr.us-east-1.amazonaws.com/toggle-master:flag-service-c90358bf5e4c31d2293951d4eacaf9c8d54186bd
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: flag-config
            - secretRef:
                name: flag-secret
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
