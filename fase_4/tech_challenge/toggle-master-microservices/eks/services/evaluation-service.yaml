apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: toggle-master
  labels:
    app: evaluation
    monitored: "true"   # selecionado pelo ServiceMonitor
spec:
  type: ClusterIP
  selector:
    app: evaluation
  ports:
    - protocol: TCP
      port: 8004
      targetPort: 8004
      name: http          # obrigatório para o ServiceMonitor referenciar por nome
