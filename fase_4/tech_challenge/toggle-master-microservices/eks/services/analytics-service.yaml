apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: toggle-master
  labels:
    app: analytics
    monitored: "true"   # selecionado pelo ServiceMonitor
spec:
  type: ClusterIP
  selector:
    app: analytics
  ports:
    - protocol: TCP
      port: 8005         
      targetPort: 8005
      name: http          # obrigatório para o ServiceMonitor referenciar por nome
