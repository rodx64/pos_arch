apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: toggle-master-services
  namespace: monitoring
  labels:
    app: prometheus
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - toggle-master
  # Seleciona todos os Services do namespace toggle-master
  selector:
    matchLabels:
      monitored: "true"
  endpoints:
    - interval: 30s
      path: /metrics
      # Cada serviço expõe métricas na mesma porta do app (sem porta dedicada)
      # O port name é definido nos Services — ver instrução abaixo
      port: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
