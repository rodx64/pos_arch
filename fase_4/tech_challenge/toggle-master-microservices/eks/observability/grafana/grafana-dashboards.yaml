apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-toggle-master
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: toggle-master
data:
  toggle-master.json: |
    {
      "title": "Toggle Master — Saúde do Ecossistema",
      "uid": "toggle-master-health",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "CPU por Pod (toggle-master)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum(rate(k8s_pod_cpu_time{k8s_namespace_name='toggle-master'}[5m])) by (k8s_pod_name)",
            "legendFormat": "{{k8s_pod_name}}"
          }]
        },
        {
          "id": 2,
          "title": "Memória por Pod (toggle-master)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum(k8s_pod_memory_working_set{k8s_namespace_name='toggle-master'}) by (k8s_pod_name)",
            "legendFormat": "{{k8s_pod_name}}"
          }]
        },
        {
          "id": 3,
          "title": "Taxa de Requisições HTTP por Serviço (30m)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "axisLabel": "req/s",
                "fillOpacity": 10,
                "lineWidth": 2,
                "axisPlacement": "auto",
                "drawStyle": "line",
                "spanNulls": false
              },
              "unit": "reqps"
            }
          },
          "targets": [{
            "expr": "sum(rate(http_requests_total{namespace='toggle-master'}[30m])) by (service)",
            "legendFormat": "{{service}}"
          }]
        },
        {
          "id": 4,
          "title": "Latência P99 por Serviço (ms)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "axisLabel": "latência (ms)",
                "fillOpacity": 10,
                "lineWidth": 2
              },
              "unit": "ms"
            }
          },
          "targets": [{
            "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace='toggle-master'}[15m])) by (le, service)) * 1000",
            "legendFormat": "p99 {{service}}"
          }]
        },
        {
          "id": 5,
          "title": "Quantidade Real de Erros (Acumulado 2m)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": {
                "drawStyle": "area",
                "fillOpacity": 50,
                "lineThickness": 2,
                "axisPlacement": "left",
                "axisSoftMax": 5
              },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace='toggle-master', status!~'OK|Created'}[2m])) by (service, status)",
              "legendFormat": "{{service}} - {{status}}",
              "refId": "A"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["max", "last"] }
          }
        },
        {
          "id": 12,
          "title": "Taxa de Erros vs Sucesso (% e count)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name",
            "orientation": "auto",
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"]
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "percent",
              "decimals": 2
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*total erros.*" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "decimals", "value": 0 }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{namespace='toggle-master', status!~'OK|Created'}[5m])) / sum(rate(http_requests_total{namespace='toggle-master'}[5m]))",
              "legendFormat": "% erro rate",
              "instant": true,
              "refId": "A"
            },
            {
              "expr": "sum(increase(http_requests_total{namespace='toggle-master', status!~'OK|Created'}[1h]))",
              "legendFormat": "total erros (1h)",
              "instant": true,
              "refId": "B"
            }
          ]
        },
        {
          "id": 6,
          "title": "SQS — Eventos Enviados por serviço (última hora)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 6 },
          "datasource": "Prometheus",
          "pluginVersion": "10.x",
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"]
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 10000 }
                ]
              },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(sqs_events_sent_total{namespace='toggle-master'}[1h])) by (service)",
              "legendFormat": "{{service}}",
              "instant": true
            }
          ]
        },
        {
          "id": 7,
          "title": "Status das Dependências",
          "type": "stat",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 6 },
          "datasource": "Prometheus",
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": [
                { 
                  "type": "value", 
                  "options": { 
                    "0": { "text": "DOWN", "color": "red" }, 
                    "1": { "text": "UP", "color": "green" } 
                  } 
                },
                { 
                  "type": "special", 
                  "options": { 
                    "match": "null", 
                    "result": { "text": "UNKNOWN", "color": "yellow" } 
                  } 
                }
              ]
            }
          },
          "targets": [
            { 
              "expr": "max(db_up{namespace='toggle-master'}) by (service) or vector(0)",
              "legendFormat": "DB — {{service}}",
              "instant": true
            },
            { 
              "expr": "max(redis_up{namespace='toggle-master'}) or vector(0)", 
              "legendFormat": "Redis",
              "instant": true
            },
            { 
              "expr": "max(sqs_up{namespace='toggle-master'}) or vector(0)", 
              "legendFormat": "SQS",
              "instant": true
            }
          ]
        },
        {
          "id": 8,
          "title": "Logs em Tempo Real — toggle-master",
          "type": "logs",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 10 },
          "datasource": "Loki",
          "targets": [{
            "expr": "{k8s_namespace_name=\"toggle-master\"}",
            "legendFormat": ""
          }]
        },
        {
          "id": 9,
          "title": "Sucesso vs Erros HTTP (timeline)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 40, "w": 24, "h": 8 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "axisLabel": "requests/sec",
                "fillOpacity": 20,
                "lineWidth": 2,
                "showPoints": "auto",
                "pointSize": 5
              },
              "unit": "reqps",
              "decimals": 4
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*sucesso.*" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*erro.*" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } },
                  { "id": "custom.fillOpacity", "value": 30 }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "calcs": ["last", "mean", "max"],
              "displayMode": "table",
              "placement": "bottom"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace='toggle-master', status=~'OK|Created'}[5m])) by (service)",
              "legendFormat": "✓ {{service}} (sucesso)",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_requests_total{namespace='toggle-master', status!~'OK|Created'}[5m])) by (service)",
              "legendFormat": "✗ {{service}} (erro)",
              "refId": "B"
            }
          ]
        },
        {
          "id": 10,
          "title": "Top 20 Endpoints mais Chamados",
          "type": "table",
          "gridPos": { "x": 0, "y": 48, "w": 12, "h": 10 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "topk(20, sum(rate(http_requests_total{namespace='toggle-master'}[5m])) by (service, method, path, status))",
            "format": "table",
            "instant": true
          }],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true
                },
                "indexByName": {
                  "service": 0,
                  "method": 1,
                  "path": 2,
                  "status": 3,
                  "Value": 4
                },
                "renameByName": {
                  "Value": "req/s"
                }
              }
            }
          ]
        },
        {
          "id": 11,
          "title": "Distribuição de Status HTTP (última hora)",
          "type": "piechart",
          "gridPos": { "x": 12, "y": 48, "w": 12, "h": 10 },
          "datasource": "Prometheus",
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "values": ["value", "percent"],
              "calcs": ["lastNotNull"]
            },
            "pieType": "donut",
            "tooltip": {
              "mode": "single"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "OK" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Internal Server Error" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Bad Gateway" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              }
            ]
          },
          "targets": [{
            "expr": "sum(increase(http_requests_total{namespace='toggle-master'}[1h])) by (status)",
            "legendFormat": "{{status}}",
            "instant": true
          }]
        }
      ]
    }
