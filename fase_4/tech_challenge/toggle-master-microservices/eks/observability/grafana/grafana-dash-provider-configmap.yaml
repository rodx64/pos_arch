apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: toggle-master
        orgId: 1
        folder: Toggle Master
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
