apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: monitoring
data:
  otel-collector-config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include: [ /var/log/pods/toggle-master*/*/**.log ]
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: regex_parser
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) (?P<log>.*)$'
          - type: json_parser
            parse_from: log

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
        send_batch_max_size: 2048
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata: 
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.container.name
            - k8s.deployment.name
            - k8s.replicaset.name
      attributes:
        actions:
          - key: env
            from_attribute: deployment.environment
            action: insert
          - key: version
            from_attribute: service.version
            action: insert
          - key: cluster
            value: "toggle-master"
            action: insert

    exporters:
      prometheusremotewrite:
        endpoint: "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      loki:
        endpoint: "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      debug:
        verbosity: basic

      datadog:
        api:
          key: "${DD_API_KEY}"
          site: "datadoghq.com"
        hostname: "otel-collector"
        host_metadata:
          enabled: true
          tags:
            - "env:dev"
            - "cluster:toggle-master"
        resource_attributes:
          enabled: true
        traces:
          compute_stats_by_span_kind: true
          span_name_as_resource_name: true

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, k8sattributes, attributes]
          exporters: [datadog, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, k8sattributes]
          exporters: [prometheusremotewrite, datadog]
        logs:
          receivers: [filelog]
          processors: [memory_limiter, batch, k8sattributes]
          exporters: [loki, datadog]
