apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: monitoring
data:
  otel-collector-config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include: [ /var/log/pods/*/*/*.log ]
        processors: [ k8sattributes ]

    processors:
      batch:
      k8sattributes:
        auth_type: "kubeconfig"
        passthrough: false
        extract:
          metadata: [ k8s.pod.name, k8s.pod.uid, k8s.namespace.name, k8s.node.name, k8s.container.name ]

    exporters:
      prometheusremotewrite:
        endpoint: "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      loki:
        endpoint: "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      datadog:
        api:
          key: "${DD_API_KEY}"
        site: "datadoghq.com"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, k8sattributes]
          exporters: [datadog]
        metrics:
          receivers: [otlp]
          processors: [batch, k8sattributes]
          exporters: [prometheusremotewrite, datadog]
        logs:
          receivers: [filelog]
          processors: [batch, k8sattributes]
          exporters: [loki, datadog]
