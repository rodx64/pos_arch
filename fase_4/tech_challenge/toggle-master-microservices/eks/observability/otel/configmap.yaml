apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: monitoring
data:
  otel-collector-config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include: [ /var/log/pods/toggle-master*/*/**.log ]
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: json_parser
            parse_from: body
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
        send_batch_max_size: 2048
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata: 
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.container.name
            - k8s.deployment.name
            - k8s.replicaset.name
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.name
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
      attributes:
        actions:
          - key: env
            from_attribute: deployment.environment
            action: insert
          - key: version
            from_attribute: service.version
            action: insert
          - key: cluster
            value: "toggle-master"
            action: insert

      # LOGS: Filtro para reduzir volume
      # filter/logs:
      #   logs:
      #     exclude:
      #       match_type: regexp
      #       record_attributes:
      #         - key: log.level
      #           value: "DEBUG|TRACE"

    exporters:
      prometheusremotewrite:
        endpoint: "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
        timeout: 30s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      loki:
        endpoint: "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        timeout: 30s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000

      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

      datadog:
        host_metadata:
          enabled: true
          tags:
            - "env:dev"
            - "cluster:toggle-master"
        metrics:
          resource_attributes_as_tags: true
          instrumentation_scope_metadata_as_tags: true
        hostname: "otel-collector"
        api:
          key: "${DD_API_KEY}"
          site: "datadoghq.com"
        traces:
          compute_stats_by_span_kind: true
          span_name_as_resource_name: true
          trace_buffer: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000

    service:
      telemetry:
        logs:
          level: info
        metrics:
          level: detailed
          address: 0.0.0.0:8888

      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, k8sattributes, attributes]
          exporters: [datadog, debug]
        
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, k8sattributes]
          exporters: [prometheusremotewrite, datadog]
        
        logs:
          receivers: [filelog]
          processors: [memory_limiter, batch, k8sattributes]
          exporters: [loki, datadog]
