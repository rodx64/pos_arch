apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: donation-hpa
  namespace: solidary-tech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: donation-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
