apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solidary-tech-ingress
  namespace: solidary-tech
spec:
  ingressClassName: nginx
  rules:
    - host: abf6387de4bd14283ba25e117b122877-06d4745e6d4cd710.elb.us-east-1.amazonaws.com
      http:
        paths:
          - path: /ngos
            pathType: Prefix
            backend:
              service:
                name: ngo-service
                port:
                  number: 8081
          - path: /donations
            pathType: Prefix
            backend:
              service:
                name: donation-service
                port:
                  number: 8082
          - path: /volunteers
            pathType: Prefix
            backend:
              service:
                name: volunteer-service
                port:
                  number: 8083
