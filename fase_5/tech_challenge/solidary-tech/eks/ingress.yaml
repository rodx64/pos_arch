apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solidary-tech-ingress
  namespace: solidary-tech
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

spec:
  ingressClassName: nginx
  rules:
    - host: a7035989d59b5415aaf4411294be88f9-b30c31c2da4df9f8.elb.us-east-1.amazonaws.com
      http:
        paths:
          - path: /ngos(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ngo-service
                port:
                  number: 8081
          - path: /donations(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: donation-service
                port:
                  number: 8082
          - path: /volunteers(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: volunteer-service
                port:
                  number: 8083
          - path: /prometheus(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: prometheus-internal-link
                port:
                  number: 9090
