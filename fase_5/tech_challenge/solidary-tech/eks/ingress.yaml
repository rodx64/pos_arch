apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: solidary-tech-ingress
  namespace: solidary-tech
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  
spec:
  ingressClassName: nginx
  rules:
    - host: ae39d331346cd41c589a29edc1a460f7-f0477d5eae9d6ce9.elb.us-east-1.amazonaws.com
      http:
        paths:
          - path: /ngos(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ngo-service
                port:
                  number: 8081
          - path: /donations(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: donations-service
                port:
                  number: 8082
          - path: /volunteers(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: volunteers-service
                port:
                  number: 8083
          - path: /prometheus(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: prometheus-internal-link
                port:
                  number: 9090

          
