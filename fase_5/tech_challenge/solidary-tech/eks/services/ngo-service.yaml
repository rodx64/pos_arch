apiVersion: v1
kind: Service
metadata:
  name: ngo-service
  namespace: solidary-tech
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
  labels:
    app: ngo
spec:
  type: ClusterIP
  selector:
    app: ngo
  ports:
    - protocol: TCP
      port: 8081         
      targetPort: 8081
