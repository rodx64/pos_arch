apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-test-script
  namespace: solidary-tech
data:
  test.js: |
    import http from "k6/http";
    import { sleep } from "k6";

    export let options = {
      vus: 30,
      duration: "30s",
    };

    export default function () {
      http.get("http://ngo-service.solidary-tech.svc.cluster.local:8081/cpu");
      http.get("http://donation-service.solidary-tech.svc.cluster.local:8082/cpu");
      http.get("http://volunteer-service.solidary-tech.svc.cluster.local:8083/cpu");
      sleep(0.1);
    }

---

apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: solidary-tech
spec:
  template:
    spec:
      containers:
        - name: k6
          image: grafana/k6
          command: ["k6", "run", "/scripts/test.js"]
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
      restartPolicy: Never
      volumes:
        - name: script-volume
          configMap:
            name: k6-test-script
