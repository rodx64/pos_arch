apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: solidary-tech
        orgId: 1
        folder: Solidary Tech
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
