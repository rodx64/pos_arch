apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-solidary-tech
  namespace: monitoring
  labels:
    app.kubernetes.io/instance: solidary-tech
data:
  solidary-tech.json: |
    {
      "title": "Solidary Tech — Saúde do Ecossistema",
      "uid": "solidary-tech-health",
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "CPU por Pod (solidary-tech)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum(rate(k8s_pod_cpu_time{k8s_namespace_name='solidary-tech'}[5m])) by (k8s_pod_name)",
            "legendFormat": "{{k8s_pod_name}}"
          }]
        },
        {
          "id": 2,
          "title": "Memória por Pod (solidary-tech)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum(k8s_pod_memory_working_set{k8s_namespace_name='solidary-tech'}) by (k8s_pod_name)",
            "legendFormat": "{{k8s_pod_name}}"
          }]
        },
        {
          "id": 3,
          "title": "Taxa de Requisições HTTP por Serviço",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "sum by (service, status) (increase(http_requests_total{namespace='solidary-tech'}[5m])) or sum by (service, status) (increase(flask_http_request_total{namespace='solidary-tech'}[5m]))",
            "legendFormat": "{{service}} - {{status}}"
          }]
        },
        {
          "id": 4,
          "title": "Latência P99 por Serviço (ms)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [{
            "expr": "histogram_quantile(0.99, sum by (le, service) (rate(http_request_duration_seconds_bucket{namespace='solidary-tech'}[15m]))) * 1000 or histogram_quantile(0.99, sum by (le, service) (rate(flask_http_request_duration_seconds_bucket{namespace='solidary-tech'}[15m]))) * 1000",
            "legendFormat": "p99 {{service}}"
          }]
        },
        {
          "id": 5,
          "title": "Doações Criadas",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "pluginVersion": "10.x",
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "mappings": [],
              "decimals": 0
            }
          },
          "targets": [
            {
              "expr": "round(sum(increase(donations_created_total{namespace='solidary-tech'}[5m])))",
              "legendFormat": "Doações Realizadas",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "title": "Status dos Componentes e Dependências",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "values": false
            }
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } },
                { "type": "special", "options": { "match": "null", "result": { "text": "DOWN", "color": "red" } } }
              ]
            }
          },
          "targets": [
            { 
              "expr": "up{namespace='solidary-tech', service='donation'}",
              "legendFormat": "Serviço: Donation" 
            },
            { 
              "expr": "up{namespace='solidary-tech', service='ngo'}",
              "legendFormat": "Serviço: NGO" 
            },
            { 
              "expr": "up{namespace='solidary-tech', service='volunteer'}",
              "legendFormat": "Serviço: Volunteer" 
            },
            { 
              "expr": "max(db_up{service='donation'}) or vector(0)",
              "legendFormat": "RDS: Donation DB" 
            },
            { 
              "expr": "max(db_up{service='ngo'}) or vector(0)",
              "legendFormat": "RDS: NGO DB" 
            },
            { 
              "expr": "vector(1)", 
              "legendFormat": "AWS SQS" 
            }
          ]
        },
        {
          "id": 7,
          "title": "Logs em Tempo Real — solidary-tech",
          "type": "logs",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 10 },
          "datasource": "Loki",
          "targets": [{
            "expr": "{exporter=\"OTLP\"} |= \"solidary-tech\"",
            "legendFormat": ""
          }]
        }
      ]
    }
