name: Self-Healing Runbook
on:
  repository_dispatch:
    types: [trigger-self-healing]

jobs:
  mitigate-incident:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get bastion IP and EKS endpoint
        id: infra
        run: |
          BASTION_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=toggle-master-dev-bastion" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          EKS_ENDPOINT=$(aws eks describe-cluster \
            --name toggle-master-eks \
            --query 'cluster.endpoint' \
            --output text | sed 's|https://||')

          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "eks_endpoint=$EKS_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Save SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/iac-key.pem
          chmod 400 /tmp/iac-key.pem

      - name: Open SSH tunnel via bastion
        run: |
          ssh -i /tmp/iac-key.pem \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -L 6443:${{ steps.infra.outputs.eks_endpoint }}:443 \
            ubuntu@${{ steps.infra.outputs.bastion_ip }} \
            -N -f
          sleep 5

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name toggle-master-eks

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          CLUSTER_ARN="arn:aws:eks:${{ secrets.AWS_REGION }}:${ACCOUNT_ID}:cluster/toggle-master-eks"

          kubectl config set-cluster "$CLUSTER_ARN" \
            --server=https://127.0.0.1:6443 \
            --insecure-skip-tls-verify=true

          kubectl config use-context "$CLUSTER_ARN"
      
      - name: Execute Runbook (Self-Healing)
        run: |
          ALERT_SOURCE="${{ github.event.client_payload.service }}"
          echo "🚨 Alerta recebido do serviço: $ALERT_SOURCE"

          if [ "$ALERT_SOURCE" == "targeting-service" ]; then
            echo "🔍 Diagnóstico: O targeting-service acusa falha de dependência (503)."
            echo "🛠️ Ação: Iniciando rollout restart no auth-service para tentar recuperação..."
            
            kubectl rollout restart deployment auth-service -n toggle-master
            
            echo "Mitigação concluída: Comando de restart enviado ao auth-service."
          else
            echo "Serviço de origem não mapeado no Runbook: $ALERT_SOURCE"
            exit 1
          fi
