name: Toggle-Master - Develop

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

env:
  WORKING_DIR: fase_3/tech_challenge/toggle-master-microservices/terraform/
  SERVICES_DIR: fase_3/tech_challenge/toggle-master-microservices
  ECR_REPOSITORY: toggle-master

jobs:
  terraform:
    name: Infra Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Lint Terraform
        uses: terraform-linters/setup-tflint@v1

      - name: Run TFLint
        working-directory: ${{ env.WORKING_DIR }}
        run: tflint

      - name: Terraform Init
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform init

      - name: Terraform Validate
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform validate

      - name: Terraform Plan Backend
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform plan

      - name: Terraform Apply Backend
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform apply -auto-approve

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.82.2'
          tofu_version: '1.10.1'

      - name: Terragrunt plan
        run: |
          cd ${{ env.WORKING_DIR }}
          terragrunt plan --all

      - name: Terragrunt apply
        run: |
          cd ${{ env.WORKING_DIR }}
          terragrunt run --all --non-interactive apply

  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    needs: terraform

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-matrix
        shell: bash
        run: |
          set -e

          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          MERGE_SHA="${{ github.sha }}"

          echo "Comparing $BASE_SHA -> $MERGE_SHA"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$MERGE_SHA")

          SERVICES=()

          add_service () { SERVICES+=("$1"); }

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/analytics-service/"; then
            add_service '{"name":"analytics","context":"${{ env.SERVICES_DIR }}/analytics-service","dockerfile":"${{ env.SERVICES_DIR }}/analytics-service/Dockerfile","image":"analytics-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/auth-service/"; then
            add_service '{"name":"auth","context":"${{ env.SERVICES_DIR }}/auth-service","dockerfile":"${{ env.SERVICES_DIR }}/auth-service/Dockerfile","image":"auth-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/evaluation-service/"; then
            add_service '{"name":"evaluation","context":"${{ env.SERVICES_DIR }}/evaluation-service","dockerfile":"${{ env.SERVICES_DIR }}/evaluation-service/Dockerfile","image":"evaluation-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/flag-service/"; then
            add_service '{"name":"flag","context":"${{ env.SERVICES_DIR }}/flag-service","dockerfile":"${{ env.SERVICES_DIR }}/flag-service/Dockerfile","image":"flag-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/targeting-service/"; then
            add_service '{"name":"targeting","context":"${{ env.SERVICES_DIR }}/targeting-service","dockerfile":"${{ env.SERVICES_DIR }}/targeting-service/Dockerfile","image":"targeting-service"}'
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON_ARRAY=$(printf '%s\n' "${SERVICES[@]}" | jq -s '.')
          MATRIX=$(jq -c '{include: .}' <<< "$JSON_ARRAY")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build & Push — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{"include":[]}'

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Criar repositório ECR (idempotente)
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }}

      - name: Generate image tags
        id: metadata
        run: |
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image }}-latest" >> $GITHUB_OUTPUT
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🐳 Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: 🔍 Scan image
        continue-on-error: true
        run: |
          aws ecr start-image-scan \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ matrix.image }}-latest \
            --region ${{ secrets.AWS_REGION }} || true

  k8s-manifests:
    name: Apply K8s Manifests
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name toggle-master-eks

      - name: Aplicar manifestos
        working-directory: ${{ env.SERVICES_DIR }}/eks
        run: |
          kubectl apply -f namespace.yaml
          kubectl apply -f secrets/
          kubectl apply -f configmaps/
          kubectl apply -f services/
          kubectl apply -f deployments/

  deploy:
    name: Deploy — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [build-push, k8s-manifests, detect-changes]
    if: needs.detect-changes.outputs.matrix != '{"include":[]}'

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name toggle-master-eks

      - name: Atualizar imagem no deployment
        run: |
          kubectl set image deployment/${{ matrix.name }}-service \
            ${{ matrix.name }}-service=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image }}-${{ github.sha }} \
            -n toggle-master

      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/${{ matrix.name }}-service \
            -n toggle-master \
            --timeout=120s
