name: Toggle-Master - Develop

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

env:
  WORKING_DIR: fase_3/tech_challenge/toggle-master-microservices/terraform/
  SERVICES_DIR: fase_3/tech_challenge/toggle-master-microservices
  ECR_REPOSITORY: toggle-master

jobs:
  terraform:
    name: Infra Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v1

      - name: Run TFLint
        working-directory: ${{ env.WORKING_DIR }}
        run: tflint

      - name: Terraform Init
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform init

      - name: Terraform Validate
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform validate

      - name: Terraform Plan
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform plan

      - name: Terraform Apply
        run: |
          cd ${{ env.WORKING_DIR }}backend/
          terraform apply -auto-approve

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.82.2'
          tofu_version: '1.10.1'

      - name: Terragrunt Plan
        run: |
          cd ${{ env.WORKING_DIR }}
          terragrunt plan --all

      - name: Terragrunt Apply
        env:
          TF_VAR_AUTH_MASTER_KEY: ${{ secrets.AUTH_MASTER_KEY }}
          TF_VAR_EVALUATION_API_KEY: ${{ secrets.EVALUATION_API_KEY }}
        run: |
          cd ${{ env.WORKING_DIR }}
          terragrunt run --all --non-interactive apply

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: terraform

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set service matrix
        id: set-matrix
        shell: bash
        run: |
          set -e

          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          MERGE_SHA="${{ github.sha }}"

          echo "Comparing $BASE_SHA -> $MERGE_SHA"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$MERGE_SHA")

          SERVICES=()

          add_service () { SERVICES+=("$1"); }

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/analytics-service/"; then
            add_service '{"name":"analytics","context":"${{ env.SERVICES_DIR }}/analytics-service","dockerfile":"${{ env.SERVICES_DIR }}/analytics-service/Dockerfile","image":"analytics-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/auth-service/"; then
            add_service '{"name":"auth","context":"${{ env.SERVICES_DIR }}/auth-service","dockerfile":"${{ env.SERVICES_DIR }}/auth-service/Dockerfile","image":"auth-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/evaluation-service/"; then
            add_service '{"name":"evaluation","context":"${{ env.SERVICES_DIR }}/evaluation-service","dockerfile":"${{ env.SERVICES_DIR }}/evaluation-service/Dockerfile","image":"evaluation-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/flag-service/"; then
            add_service '{"name":"flag","context":"${{ env.SERVICES_DIR }}/flag-service","dockerfile":"${{ env.SERVICES_DIR }}/flag-service/Dockerfile","image":"flag-service"}'
          fi

          if echo "$CHANGED_FILES" | grep -q "^${{ env.SERVICES_DIR }}/targeting-service/"; then
            add_service '{"name":"targeting","context":"${{ env.SERVICES_DIR }}/targeting-service","dockerfile":"${{ env.SERVICES_DIR }}/targeting-service/Dockerfile","image":"targeting-service"}'
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON_ARRAY=$(printf '%s\n' "${SERVICES[@]}" | jq -s '.')
          MATRIX=$(jq -c '{include: .}' <<< "$JSON_ARRAY")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build and Push — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{"include":[]}'

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: metadata
        run: |
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image }}-latest" >> $GITHUB_OUTPUT
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Scan image
        continue-on-error: true
        run: |
          aws ecr start-image-scan \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ matrix.image }}-latest \
            --region ${{ secrets.AWS_REGION }} || true

  k8s-secrets:
    name: Apply Kubernetes Secrets
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.82.2'
          tofu_version: '1.10.1'

      - name: Terragrunt Apply K8s Secrets
        env:
          TF_VAR_AUTH_MASTER_KEY: ${{ secrets.AUTH_MASTER_KEY }}
          TF_VAR_EVALUATION_API_KEY: ${{ secrets.EVALUATION_API_KEY }}
        run: |
          cd ${{ env.WORKING_DIR }}k8s-secrets/dev/
          terragrunt apply -auto-approve

  k8s-manifests:
    name: Apply Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: [terraform, k8s-secrets]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get bastion IP and EKS endpoint
        id: infra
        run: |
          BASTION_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=toggle-master-dev-bastion" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          if [ -z "$BASTION_IP" ] || [ "$BASTION_IP" = "None" ]; then
            echo "ERROR: Bastion IP not found."
            exit 1
          fi

          EKS_ENDPOINT=$(aws eks describe-cluster \
            --name toggle-master-eks \
            --query 'cluster.endpoint' \
            --output text | sed 's|https://||')

          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "eks_endpoint=$EKS_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Save SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/iac-key.pem
          chmod 400 /tmp/iac-key.pem

      - name: Open SSH tunnel via bastion
        run: |
          ssh -i /tmp/iac-key.pem \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -L 6443:${{ steps.infra.outputs.eks_endpoint }}:443 \
            ubuntu@${{ steps.infra.outputs.bastion_ip }} \
            -N -f

          sleep 5

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name toggle-master-eks

          CLUSTER_NAME=$(kubectl config get-clusters | grep eks | tail -1)
          kubectl config set-cluster $CLUSTER_NAME \
            --server=https://127.0.0.1:6443 \
            --insecure-skip-tls-verify=true

      - name: Apply manifests
        working-directory: ${{ env.SERVICES_DIR }}/eks
        run: |
          kubectl apply -f namespace.yaml
          kubectl apply -f configmaps/
          kubectl apply -f services/
          kubectl apply -f deployments/

  deploy:
    name: Deploy — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [build-push, k8s-manifests, detect-changes]
    if: needs.detect-changes.outputs.matrix != '{"include":[]}'

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get bastion IP and EKS endpoint
        id: infra
        run: |
          BASTION_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=toggle-master-dev-bastion" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          if [ -z "$BASTION_IP" ] || [ "$BASTION_IP" = "None" ]; then
            echo "ERROR: Bastion IP not found."
            exit 1
          fi

          EKS_ENDPOINT=$(aws eks describe-cluster \
            --name toggle-master-eks \
            --query 'cluster.endpoint' \
            --output text | sed 's|https://||')

          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "eks_endpoint=$EKS_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Save SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/iac-key.pem
          chmod 400 /tmp/iac-key.pem

      - name: Open SSH tunnel via bastion
        run: |
          ssh -i /tmp/iac-key.pem \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -L 6443:${{ steps.infra.outputs.eks_endpoint }}:443 \
            ubuntu@${{ steps.infra.outputs.bastion_ip }} \
            -N -f

          sleep 5

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name toggle-master-eks

          CLUSTER_NAME=$(kubectl config get-clusters | grep eks | tail -1)
          kubectl config set-cluster $CLUSTER_NAME \
            --server=https://127.0.0.1:6443 \
            --insecure-skip-tls-verify=true

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ matrix.name }}-service \
            ${{ matrix.name }}-service=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ matrix.image }}-${{ github.sha }} \
            -n toggle-master

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ matrix.name }}-service \
            -n toggle-master \
            --timeout=120s
