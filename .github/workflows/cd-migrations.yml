name: CD — DB Migrations

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "fase_5/tech_challenge/solidary-tech/db-migrations/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "fase_5/tech_challenge/solidary-tech/db-migrations/**"
  workflow_dispatch: {}

env:
  DB_MIGRATIONS_DIR: fase_5/tech_challenge/solidary-tech/db-migrations/dev
  TG_VERSION: "0.82.2"
  TOFU_VERSION: "1.10.1"

jobs:
  deploy:
    name: Terragrunt Apply — DB Migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Get bastion IP and EKS endpoint
        id: infra
        run: |
          BASTION_IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=solidary-tech-dev-bastion" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          if [ -z "$BASTION_IP" ] || [ "$BASTION_IP" = "None" ]; then
            echo "ERROR: Bastion IP not found."
            exit 1
          fi

          EKS_ENDPOINT=$(aws eks describe-cluster \
            --name solidary-tech-eks \
            --query 'cluster.endpoint' \
            --output text | sed 's|https://||')

          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "eks_endpoint=$EKS_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Save SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/iac-key.pem
          chmod 400 /tmp/iac-key.pem

      - name: Open SSH tunnel via bastion
        run: |
          ssh -i /tmp/iac-key.pem \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -L 6443:${{ steps.infra.outputs.eks_endpoint }}:443 \
            ubuntu@${{ steps.infra.outputs.bastion_ip }} \
            -N -f
          sleep 5

      - name: Terragrunt Apply
        working-directory: ${{ env.DB_MIGRATIONS_DIR }}
        env:
          KUBE_HOST: "https://127.0.0.1:6443"
          KUBE_INSECURE: "true"
        run: |
          terragrunt apply --auto-approve --terragrunt-non-interactive
