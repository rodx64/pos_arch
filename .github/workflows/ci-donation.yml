name: CI — donation-service

on:
  push:
    branches: ["develop"]
    paths:
      - "fase_5/tech_challenge/solidary-tech/services/donation-service/**"
  pull_request:
    branches: ["develop"]
    paths:
      - "fase_5/tech_challenge/solidary-tech/services/donation-service/**"
  workflow_run:
    workflows: ["CI/CD — Terraform Infrastructure"]
    types: [completed]
    branches: ["develop", "main"]
  workflow_dispatch: {}

env:
  SERVICE_DIR: fase_5/tech_challenge/solidary-tech/services/donation-service
  SERVICE_NAME: donation-service
  ECR_REPOSITORY: solidary-tech

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SERVICE_DIR }}/go.mod

      - name: Run tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: go test ./... -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SERVICE_DIR }}/go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ env.SERVICE_DIR }}
          version: latest
          skip-cache: true

  sca:
    name: SCA — Trivy fs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_DIR }}
          severity: CRITICAL
          exit-code: 1
          format: table

  sast:
    name: SAST — Gosec
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SERVICE_DIR }}/go.mod

      - name: Install gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          ~/go/bin/gosec ./... -severity high -confidence high

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [sca, sast]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ secrets.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: false
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-${{ github.sha }}
          platforms: linux/amd64
          load: true
          provenance: false
          sbom: false

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Push images (App & Migration)
        run: |
          # Push App
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-${{ github.sha }}
          docker tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-latest

          # Build e Push Migration
          docker build -f ${{ env.SERVICE_DIR }}/Dockerfile.migration -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-migration-${{ github.sha }} ${{ env.SERVICE_DIR }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-migration-${{ github.sha }}
          docker tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-migration-${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-migration-latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-migration-latest

  update-tag:
    name: Update Tag — donation
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tag in deployment and terragrunt
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.SERVICE_NAME }}-${{ github.sha }}
          MIG_TAG: ${{ env.SERVICE_NAME }}-migration-${{ github.sha }}
        run: |
          SERVICE_SHORT=$(echo "${{ env.SERVICE_NAME }}" | sed 's/-service//')
          DEPLOY_FILE="fase_5/tech_challenge/solidary-tech/eks/deployments/${SERVICE_SHORT}.yaml"
          TG_FILE="fase_5/tech_challenge/solidary-tech/db-migrations/dev/terragrunt.hcl"
          sed -i "s|${{ env.ECR_REPOSITORY }}:${{ env.SERVICE_NAME }}-[^\"]*|${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}|g" "$DEPLOY_FILE"
          sed -i "s|donation_migration_image = \"[^\"]*\"|donation_migration_image = \"${REGISTRY}/${{ env.ECR_REPOSITORY }}:${MIG_TAG}\"|g" "$TG_FILE"

          git add "$DEPLOY_FILE" "$TG_FILE"

          if git diff --cached --quiet; then
            echo "Nenhuma mudança — pulando commit."
            exit 0
          fi

          git commit -m "ci: update ${{ env.SERVICE_NAME }} images (app & migration) to ${{ github.sha }} [skip ci]"

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash
            sleep $(( (RANDOM % 5) + 3 ))
          done
          exit 1
