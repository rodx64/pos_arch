name: CI/CD — Documentation

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "fase_5/tech_challenge/solidary-tech/docs/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "fase_5/tech_challenge/solidary-tech/docs/**"
  workflow_dispatch: {}

env:
  DOCS_DIR: fase_5/tech_challenge/solidary-tech/docs

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.DOCS_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.DOCS_DIR }}
        run: npm ci

      - name: Build website
        working-directory: ${{ env.DOCS_DIR }}
        run: npm run build

      - name: Upload artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DOCS_DIR }}/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
